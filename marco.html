<!DOCTYPE html>
<html lang="pt-br">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Meu Site</title>

        <style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f4f6f9;
    text-align:center;
    margin:0;
    padding:20px;
}

/* CAIXA PRINCIPAL */

.container{
    background-color:white;
    max-width:700px;
    width:90%;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* TITULOS */

h1{
    color:#2c3e50;
}

h2{
    color:#34495e;
    margin-top:30px;
}

/* TEXTO */

p{
    color:#555;
    font-size:18px;
}

/* IMAGEM RESPONSIVA */

img{
    width:100%;
    max-width:350px;
    border-radius:10px;
    margin-top:20px;
}

/* LISTA */

ul{
    list-style:none;
    padding:0;
}

li{
    background-color:#ecf0f1;
    margin:10px 0;
    padding:10px;
    border-radius:6px;
}

/* BOTÕES */

.social-buttons{
    margin-top:20px;
}

.btn{
    display:inline-block;
    padding:12px 20px;
    margin:10px;
    text-decoration:none;
    color:white;
    border-radius:6px;
    font-weight:bold;
}

/* CORES */

.instagram{
    background-color:#E1306C;
}

.facebook{
    background-color:#1877F2;
}
.whatsapp {
    background-color: #21C063;
}

.btn:hover{
    opacity:0.8;
}

/* RESPONSIVIDADE */

@media (max-width:600px){

    h1{
        font-size:24px;
    }

    p{
        font-size:16px;
    }

    .container{
        padding:20px;
    }

}

</style>

    </head>

    <body>

        <div class="container">

            <h1>Bem-vindo ao meu site</h1>

            <p>Estou aprendendo programação</p>

            <img
                src="https://p2.trrsf.com/image/fget/cf/1200/1200/middle/images.terra.com/2024/06/22/1597160243-0b33d0d533a1f0510191e4361504ffc6.jpg">

            <h2>Sobre mim</h2>

            <p>Meu nome é: Marco Barroso</p>

            <div class="social-buttons">
                <a href="#" class="btn instagram">Instagram</a>
                <a href="#" class="btn facebook">Facebook</a>
                <a class="btn whatsapp"
                    href="https://wa.me/5591985301811?text=Olá%20quero%20saber%20mais%20sobre%20o%20curso">Falar
                    no WhatsApp</a>
            </div>

            <h2>Meus objetivos</h2>

            <ul>
                <li>Aprender Frontend</li>
                <li>Ganhar dinheiro</li>
                <li>Trabalhar remotamente</li>
            </ul>

        </div>

    </body>
</html>
